<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestion Box</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            position: relative;
            z-index: 1000;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.8), 0 0 6px rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(0, 0, 0, 0.4);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <a class="back-link" href="music.html">Back to Music</a>

    <header>
        <h1>Suggestion Box</h1>
        <p>Add an album or song to my todo list!</p>
    </header>

    <main class="music-shell">
        <section class="music-panel" id="editor-panel">
            <h2>New Suggestion</h2>
            <p class="music-meta">Submit an album or song to add to the todo list.</p>
            
            <div class="search-toggle" role="group" aria-label="Type">
                <button class="toggle-button is-active" id="type-album" type="button" data-type="album">Album</button>
                <button class="toggle-button" id="type-song" type="button" data-type="song">Song</button>
            </div>
            
            <form id="suggestion-form" class="rating-form">
                <label class="form-label" for="artist">Artist *</label>
                <input class="form-input" id="artist" placeholder="Artist name" required>

                <label class="form-label" for="title">Title *</label>
                <input class="form-input" id="title" placeholder="Album or song title" required>

                <label class="form-label" for="notes">Notes</label>
                <textarea class="form-input form-textarea" id="notes" rows="4" placeholder="Optional notes about this suggestion"></textarea>

                <button class="action-button" type="submit">Generate Entry</button>
            </form>
            
            <p class="status" id="status"></p>
        </section>
    </main>

    <script>
        const suggestionForm = document.getElementById('suggestion-form');
        const artistInput = document.getElementById('artist');
        const titleInput = document.getElementById('title');
        const notesInput = document.getElementById('notes');
        const statusMessage = document.getElementById('status');
        const typeAlbumBtn = document.getElementById('type-album');
        const typeSongBtn = document.getElementById('type-song');

        let currentType = 'album';

        function formatSuggestion(type, artist, title, notes) {
            let entry = '- ' + type + '-' + title.trim() + '-' + artist.trim();
            if (notes.trim()) {
                entry += '\n  ' + notes.trim();
            }
            return entry;
        }

        function setType(type) {
            currentType = type;
            typeAlbumBtn.classList.toggle('is-active', type === 'album');
            typeSongBtn.classList.toggle('is-active', type === 'song');
        }

        typeAlbumBtn.addEventListener('click', function() {
            setType('album');
        });

        typeSongBtn.addEventListener('click', function() {
            setType('song');
        });

        suggestionForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const artist = artistInput.value.trim();
            const title = titleInput.value.trim();
            const notes = notesInput.value.trim();
            
            if (!artist) {
                statusMessage.textContent = 'Error: Please enter an artist name.';
                artistInput.focus();
                return;
            }

            if (!title) {
                statusMessage.textContent = 'Error: Please enter a title.';
                titleInput.focus();
                return;
            }

            const formatted = formatSuggestion(currentType, artist, title, notes);
            statusMessage.textContent = 'Added to todo list!';
            artistInput.value = '';
            titleInput.value = '';
            notesInput.value = '';
            artistInput.focus();
            setTimeout(function() {
                statusMessage.textContent = '';
            }, 3000);
        });
    </script>
</body>
</html>
